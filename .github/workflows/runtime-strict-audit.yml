name: Backend FastAPI Guard

on:
  pull_request:
    paths:
      - 'backend-fastapi/**/*.py'
      - 'backend-fastapi/requirements.txt'
      - '.github/workflows/runtime-strict-audit.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'backend-fastapi/**/*.py'
      - 'backend-fastapi/requirements.txt'
      - '.github/workflows/runtime-strict-audit.yml'

jobs:
  backend-fastapi-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify backend-fastapi directory exists
        run: test -d backend-fastapi

      - name: Compile backend-fastapi Python sources
        run: python -m compileall backend-fastapi

      - name: Verify FastAPI entry module syntax
        run: python -m py_compile backend-fastapi/main.py
