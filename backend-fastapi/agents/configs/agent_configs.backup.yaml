agents:
  kgqa_agent:
    agent_name: kgqa_agent
    display_name: 知识图谱问答助手
    description: 用于回答关于广西洪涝灾害相关问题，利用时空知识图谱回答问题，包含时空信息
    enabled: true
    llm:
      provider: test
      provider_type: deepseek
      model_name: deepseek-chat
      temperature: 0.3
      max_tokens: null
      max_completion_tokens: 4096
      max_context_tokens: 128000
      top_p: null
      timeout: 30
      retry_attempts: 3
    llm_tiers: null
    tools:
      enabled_tools: []
    skills:
      enabled_skills:
      - kg-advanced-query
      auto_inject: true
    mcp:
      enabled_servers: []
    custom_params:
      behavior:
        auto_execute_tools: true
        max_rounds: 10
        system_prompt: '你是广西洪涝灾害知识图谱问答专家。直接执行查询，不解释推理过程。


          遇到灾情查询：先 activate_skill(kg-advanced-query)，按 Skill 流程用工具查询，基于结果直接回答。

          数据不在系统中时直接告知，不编造。

          '
      type: react
  flood_extraction_agent:
    agent_name: flood_extraction_agent
    display_name: 洪涝灾害数据提取助手
    description: 从长文档中提取洪涝灾害结构化数据，生成符合知识图谱 schema 的 JSON 文件
    enabled: false
    llm:
      provider: test
      provider_type: deepseek
      model_name: deepseek-chat
      temperature: 0.2
      max_tokens: null
      max_completion_tokens: 4096
      max_context_tokens: 128000
      top_p: null
      timeout: 60
      retry_attempts: 3
    llm_tiers: null
    tools:
      enabled_tools:
      - read_document
      - chunk_document
      - extract_structured_data
      - merge_extracted_data
      - write_file
    skills:
      enabled_skills:
      - flood-disaster-extraction
      auto_inject: true
    mcp:
      enabled_servers: []
    custom_params:
      behavior:
        auto_execute_tools: true
        max_rounds: 15
        system_prompt: '你是洪涝灾害数据提取专家。直接执行提取流程，不解释步骤。

          严格按照 flood-disaster-extraction skill 的 schema 提取。时间格式统一 YYYY-MM-DD，数值准确，缺失字段直接省略。

          '
      type: react
  test_skill_agent:
    agent_name: test_skill_agent
    display_name: 测试skill是否环境独立
    description: 包含一个skill，可以用于测试系统环境独立功能
    enabled: false
    llm:
      provider: test
      provider_type: deepseek
      model_name: deepseek-chat
      temperature: 0.7
      max_tokens: null
      max_completion_tokens: 4096
      max_context_tokens: 128000
      top_p: null
      timeout: 30
      retry_attempts: 3
    llm_tiers: null
    tools:
      enabled_tools: []
    skills:
      enabled_skills:
      - test-isolation-skill
      auto_inject: true
    mcp:
      enabled_servers: []
    custom_params:
      behavior:
        auto_execute_tools: true
        max_rounds: 10
        system_prompt: 你是一个用于测试系统环境是否独立的专家，请使用你的skill及其脚本进行测试
      type: react
  chart_agent:
    agent_name: chart_agent
    display_name: 可视化智能体
    description: 可以生成echart配置用于可视化
    enabled: true
    llm:
      provider: test
      provider_type: deepseek
      model_name: deepseek-chat
      temperature: 0.7
      max_tokens: null
      max_completion_tokens: 4096
      max_context_tokens: 128000
      top_p: null
      timeout: 30
      retry_attempts: 3
    llm_tiers: null
    tools:
      enabled_tools:
      - generate_chart
      - update_chart_config
      - present_chart
      - generate_map
      - execute_code
    skills:
      enabled_skills:
      - kg-advanced-query
      auto_inject: true
    mcp:
      enabled_servers: []
    custom_params:
      behavior:
        auto_execute_tools: true
        max_rounds: 15
        system_prompt: '你是可视化智能体。根据数据直接生成图表，不解释过程。

          时序数据→折线图，分类对比→柱状图，占比→饼图，地理分布→地图。数据格式不符时用 execute_code 转换后再生成。

          '
      type: react
  emergency_agent:
    agent_name: emergency_agent
    display_name: 应急预案助手
    description: 提供广西洪涝灾害相关预案
    enabled: false
    llm:
      provider: test
      provider_type: openrouter
      model_name: minimax/minimax-m2.5
      temperature: 0.7
      max_tokens: 4096
      max_completion_tokens: 4096
      max_context_tokens: 126000
      top_p: null
      timeout: 30
      retry_attempts: 3
    llm_tiers: null
    tools:
      enabled_tools:
      - query_emergency_plan
    skills:
      enabled_skills: []
      auto_inject: true
    mcp:
      enabled_servers: []
    custom_params:
      behavior:
        auto_execute_tools: true
        max_rounds: 10
        system_prompt: 你是一个应急预案助手，负责提供相关预案
      type: react
  orchestrator_agent:
    agent_name: orchestrator_agent
    display_name: Orchestrator Agent
    description: 动态智能体编排器，将 Agent 当作工具使用，通过 ReAct 模式实时决策
    enabled: true
    llm:
      provider: test
      provider_type: deepseek
      model_name: deepseek-chat
      temperature: 0.3
      max_tokens: null
      max_completion_tokens: 4096
      max_context_tokens: 128000
      top_p: null
      timeout: 60
      retry_attempts: 3
    llm_tiers: null
    tools:
      enabled_tools:
      - query_emergency_plan
      - write_file
      - read_file
    skills:
      enabled_skills: []
      auto_inject: true
    mcp:
      enabled_servers:
      - io_github_dgahagan_weather-mcp
      - io_github_seey215_tavily-mcp
    custom_params:
      behavior:
        compression_trigger_ratio: 0.85
        data_save_dir: ./static/temp_data
        max_rounds: 15
        preserve_recent_turns: 3
        summarize_max_tokens: 300
        system_prompt: '你是广西洪涝灾害系统的主编排器。直接调用合适的 Agent，不解释决策过程。

          灾情数据→kgqa_agent；可视化→chart_agent；应急预案→query_emergency_plan；需要图文结合→先kgqa_agent后chart_agent。

          子Agent无对话历史，task字段必须包含所有必要信息。

          '
      type: orchestrator
