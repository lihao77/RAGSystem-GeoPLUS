# 智能体插件化配置示例
#
# 本文件展示如何通过配置定义新的智能体，无需编写代码
#
# 使用方法：
# 1. 将此文件内容添加到 backend/agents/configs/agent_configs.yaml
# 2. 重启后端服务
# 3. 新的智能体会自动加载并可用

agents:
  # ======== 现有智能体（使用 ReAct 模式）========

  qa_agent:
    agent_name: qa_agent
    display_name: 问答智能体
    description: 知识图谱问答智能体
    enabled: true
    llm:
      temperature: 0.2
      max_tokens: 4096
    tools:
      enabled_tools:
        - query_knowledge_graph_with_nl
        - search_knowledge_graph
        - get_entity_relations
    custom_params:
      type: react  # 使用 ReAct 智能体（推荐）
      behavior:
        max_rounds: 10
        system_prompt: "你是一个知识图谱问答助手..."

  master_agent:
    agent_name: master_agent
    display_name: 主协调智能体
    description: 主协调智能体，负责任务分析和分解
    enabled: true
    llm:
      temperature: 0.0
      max_tokens: 2000
    custom_params:
      type: master  # 指定使用 MasterAgent 类
      analysis_temperature: 0.0
      synthesis_temperature: 0.3

  # ======== 新增智能体（使用通用模板）========

  # 示例 1：设施监控智能体
  facility_monitor:
    agent_name: facility_monitor
    display_name: 设施监控智能体
    description: 专门监控和分析设施状态的智能体
    enabled: true
    llm:
      temperature: 0.1  # 低温度，确保准确性
      max_tokens: 4096
    tools:
      enabled_tools:
        # 只启用与设施相关的工具
        - search_knowledge_graph
        - get_entity_relations
        - analyze_temporal_pattern
    custom_params:
      type: generic  # 使用通用智能体模板
      behavior:
        system_prompt: |
          你是一个专业的设施监控智能体。
          你的职责是：
          1. 监控设施的状态变化
          2. 分析设施的时序模式
          3. 发现异常状态并预警

          在回答问题时：
          - 关注设施的实时状态
          - 识别异常模式
          - 提供数据支持的结论
        max_rounds: 15  # 允许更多轮次进行深入分析
        auto_execute_tools: true
        task_patterns:
          # 只处理与设施相关的问题
          - "设施"
          - "facility"
          - "状态"
          - "监控"

  # 示例 2：应急预案查询智能体
  emergency_plan_agent:
    agent_name: emergency_plan_agent
    display_name: 应急预案智能体
    description: 专门查询和解读应急预案的智能体
    enabled: true
    llm:
      temperature: 0.0  # 极低温度，确保预案信息准确
      max_tokens: 8192  # 大 token 数，支持长预案
    tools:
      enabled_tools:
        # 只启用应急预案相关工具
        - query_emergency_plan
    custom_params:
      type: generic
      behavior:
        system_prompt: |
          你是一个应急预案专家智能体。
          你的职责是：
          1. 根据用户问题查询相关应急预案
          2. 解读预案内容，提取关键信息
          3. 提供可执行的应急措施建议

          回答要求：
          - 准确引用预案内容
          - 结构化呈现应急步骤
          - 突出关键注意事项
        max_rounds: 5
        auto_execute_tools: true
        task_patterns:
          - "应急"
          - "emergency"
          - "预案"
          - "plan"
          - "如何处理"
          - "怎么办"

  # 示例 3：数据分析智能体
  data_analyst:
    agent_name: data_analyst
    display_name: 数据分析智能体
    description: 专注于数据统计和分析的智能体
    enabled: true
    llm:
      temperature: 0.3
      max_tokens: 6144
    tools:
      enabled_tools:
        - analyze_temporal_pattern
        - find_causal_chain
        - compare_entities
        - aggregate_statistics
        - generate_chart
    custom_params:
      type: generic
      behavior:
        system_prompt: |
          你是一个专业的数据分析智能体。
          你擅长：
          1. 时序数据分析
          2. 因果关系推断
          3. 实体对比分析
          4. 统计聚合计算
          5. 数据可视化

          分析原则：
          - 基于数据说话
          - 识别趋势和模式
          - 提供量化结论
          - 建议合适的可视化方式
        max_rounds: 20  # 分析可能需要多步骤
        auto_execute_tools: true

  # 示例 4：快速查询智能体（禁用示例）
  quick_query:
    agent_name: quick_query
    display_name: 快速查询
    description: 提供快速、简洁的查询结果
    enabled: false  # 暂时禁用
    llm:
      provider: deepseek  # 使用便宜快速的模型
      temperature: 0.1
      max_tokens: 1024  # 限制输出长度
    tools:
      enabled_tools:
        - search_knowledge_graph
    custom_params:
      type: generic
      behavior:
        system_prompt: "你是一个快速查询助手，提供简洁的答案。"
        max_rounds: 3  # 快速响应，减少轮次
        auto_execute_tools: true

metadata:
  version: '2.0'
  updated_at: '2026-01-05T00:00:00'
  description: '支持插件化智能体的配置文件'
