# Neo4j 配置
neo4j:
  uri: bolt://localhost:7687
  user: neo4j
  password: ""  # 可以从环境变量 NEO4J__PASSWORD 读取

# 向量存储配置（新版）
vector_store:
  # 后端选择: "sqlite_vec" (推荐) 或 "postgresql" (未来扩展)
  backend: sqlite_vec  # 可以从环境变量 VECTOR_STORE__BACKEND 读取

  # SQLite + sqlite-vec 配置
  sqlite_vec:
    database_path: data/ragsystem.db  # 统一数据库路径（相对于 backend/ 目录）
    vector_dimension: 768  # 向量维度（需与 Embedding 模型匹配）
    distance_metric: cosine  # 距离度量: cosine (推荐), l2, ip

  # PostgreSQL + pgvector 配置（未来扩展）
  postgresql:
    host: localhost
    port: 5432
    database: ragsystem
    user: postgres
    password: ""  # 可以从环境变量 VECTOR_STORE__POSTGRESQL__PASSWORD 读取
    vector_dimension: 768

# LLM 配置（支持 LLMAdapter）
llm:
  # LLMAdapter 配置（推荐方式）
  provider: ""  # LLM 提供商名称，如: openai, deepseek, openrouter
  model_name: "deepseek-chat"  # 模型名称
  temperature: 0.7
  max_tokens: 4096
  timeout: 30
  retry_attempts: 3

  # 旧版配置（向后兼容）
  # 如果配置了 provider，以下配置将被忽略
  api_endpoint: https://api.deepseek.com/v1
  api_key: ""  # 可以从环境变量 LLM__API_KEY 读取

# Embedding 配置
embedding:
  # 模式选择: "remote" (推荐，使用远程 API，无需本地模型)
  mode: remote  # 可以从环境变量 EMBEDDING__MODE 读取

  # 本地模型配置（已弃用，不推荐使用）
  # 需要安装 sentence-transformers 和 PyTorch (~500MB)
  local:
    model_name: BAAI/bge-small-zh-v1.5
    device: cpu
    cache_dir: null

# Skills 系统配置
skills:
  # 依赖隔离模式
  # - venv: 虚拟环境隔离（推荐，每个 Skill 独立环境）
  # - docker: Docker 容器隔离（生产环境，暂未实现）
  # - shared: 共享环境（开发测试，依赖可能冲突）
  isolation_mode: venv

  # 自动安装依赖（首次执行脚本时自动安装 requirements.txt）
  auto_install_dependencies: true

  # 虚拟环境目录名（相对于 Skill 目录）
  venv_dir_name: .venv

  # 远程 API 配置（推荐）
  remote:
    api_endpoint: ""  # 例如: https://api.openai.com/v1 或 https://api.deepseek.com/v1
    api_key: ""  # 可以从环境变量 EMBEDDING__REMOTE__API_KEY 读取
    model_name: text-embedding-3-small  # 远程模型名称
    timeout: 30  # 请求超时时间（秒）
    max_retries: 3  # 最大重试次数
    batch_size: 10  # 单次请求最多处理的文本数量（不同 API 限制不同，建议 10-50）

# 系统配置
system:
  max_content_length: 104857600  # 100MB (字节)

# 外部库配置（为 llmjson 和 json2graph-for-review 预留）
external_libs:
  # llmjson 配置
  llmjson:
    # 可在集成时扩展
    enabled: true
    settings: {}

  # json2graph-for-review 配置
  json2graph:
    # 可在集成时扩展
    enabled: true
    settings: {}
