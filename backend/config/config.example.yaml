# ============================================================
# RAGSystem 配置示例
# ============================================================
# 复制此文件为 config.yaml 并根据实际情况修改

# Neo4j 配置
neo4j:
  uri: bolt://localhost:7687
  user: neo4j
  password: "your_password_here"  # 或通过环境变量 NEO4J__PASSWORD 设置

# LLM 配置
llm:
  api_endpoint: https://api.deepseek.com/v1
  api_key: "your_api_key_here"  # 或通过环境变量 LLM__API_KEY 设置
  model_name: deepseek-chat
  temperature: 0.7
  max_tokens: 4096

# Embedding 配置
embedding:
  # 模式选择: "local" 或 "remote"
  mode: local  # 或通过环境变量 EMBEDDING__MODE 设置
  
  # 本地模型配置
  local:
    # 推荐的中文模型（按大小排序）:
    # - BAAI/bge-small-zh-v1.5 (小, 快, ~100MB)
    # - BAAI/bge-base-zh-v1.5 (中, 平衡, ~400MB)
    # - BAAI/bge-large-zh-v1.5 (大, 准确, ~1.2GB)
    model_name: BAAI/bge-small-zh-v1.5
    device: cpu  # cpu 或 cuda
    cache_dir: null  # 默认使用 ~/.cache/huggingface
  
  # 远程 API 配置（当 mode=remote 时使用）
  remote:
    # OpenAI API 示例
    api_endpoint: https://api.openai.com/v1
    api_key: "your_openai_api_key"  # 或通过环境变量 EMBEDDING__REMOTE__API_KEY
    model_name: text-embedding-3-small
    
    # 或者使用自建服务
    # api_endpoint: http://localhost:8000/v1
    # model_name: bge-large-zh-v1.5
    
    timeout: 30
    max_retries: 3

# 系统配置
system:
  max_content_length: 104857600  # 100MB

# 外部库配置
external_libs:
  llmjson:
    enabled: true
  json2graph:
    enabled: true
